services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env
    environment:
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:5173,http://127.0.0.1:5173}
      SUPABASE_URL: ${SUPABASE_URL:-}
      SUPABASE_JWT_AUDIENCE: ${SUPABASE_JWT_AUDIENCE:-authenticated}
      # Keep this path if you mount ADC credentials below.
      GOOGLE_APPLICATION_CREDENTIALS: ${GOOGLE_APPLICATION_CREDENTIALS:-/gcloud/adc.json}
    ports:
      - "8000:8080"
    volumes:
      - ${HOME}/.config/gcloud/application_default_credentials.json:/gcloud/adc.json:ro
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8080/health', timeout=3)"]
      interval: 20s
      timeout: 5s
      retries: 3
      start_period: 20s
